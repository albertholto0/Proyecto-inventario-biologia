<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="/assets/images/box.png">
</head>
<body>
    <div class="contenedor">
        <aside class="menu-lateral">
            <div id="nav-dinamico"></div>
        </aside>
        <main>
            <header class="encabezado">
                <h1>Inventario</h1>
                <p>Materiales y Equipos</p>
            </header>
            <section>
                <h2>Materiales</h2>
                <div class="tabla">
                    <table id="tabla-materiales">
                        <thead>
                            <tr>
                                <th>ID Material</th>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Presentación</th>
                                <th>Unidad</th>
                                <th>Clave</th>
                                <th>Cantidad</th>
                                <th>ID Laboratorio</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </section>
            <section>
                <h2>Equipos</h2>
                <div class="tabla">
                    <table id="tabla-equipos">
                        <thead>
                            <tr>
                                <th>ID Equipo</th>
                                <th>Nombre</th>
                                <th>ID Grupo</th>
                                <th>ID Categoría</th>
                                <th>ID Subcategoría</th>
                                <th>ID Tipo</th>
                                <th>Marca</th>
                                <th>Modelo</th>
                                <th>Serie</th>
                                <th>Color</th>
                                <th>Precio</th>
                                <th>ID Estado Físico</th>
                                <th>ID Laboratorio</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
<script src="/assets/datos_dinamicos.js"></script>
<script>
    fetch('assets/nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav-dinamico').innerHTML = data;
        });
</script>
</html>
